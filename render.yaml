# render.yaml — eMooJI / MooFind deployment configuration
services:

  # ═══════════════════════════════════════════════════════════════════════════
  # SERVICE 1 — PWA + Token Proxy (Node.js)
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: emoo-ji-app
    runtime: node
    rootDir: moo-app
    buildCommand: npm install && npx expo export --platform web
    startCommand: node proxy.js
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: JACKDAW_CLIENT_ID
        sync: false

      - key: JACKDAW_CLIENT_SECRET
        sync: false

  # ═══════════════════════════════════════════════════════════════════════════
  # SERVICE 2 — MCP Server (Python / Docker)
  # ═══════════════════════════════════════════════════════════════════════════
  - type: web
    name: emoo-ji-mcp
    runtime: docker
    rootDir: moo-mcp
    dockerfilePath: ./Dockerfile
    autoDeploy: true

    envVars:
      - key: COPERNICUS_CLIENT_ID
        sync: false

      - key: COPERNICUS_CLIENT_SECRET
        sync: false